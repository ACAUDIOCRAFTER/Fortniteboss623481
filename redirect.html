<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AudioCrafter - Redirecting...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { min-height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
  .container { position: relative; z-index: 10; background: rgba(10,10,10,0.88); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 40px 36px; width: 380px; text-align: center; backdrop-filter: blur(12px); }
  .title { color: #fff; font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #ff4444; font-size: 14px; display: none; }
</style>
</head>
<body>
<div class="container">
  <div class="title">Verifying completion...</div>
  <div class="spinner" id="spinner"></div>
  <div id="error" class="error">Something went wrong.</div>
</div>
<script>
  async function getToken() {
    try {
      const res = await fetch('/api/keysystem?action=gentoken&secret=carf1x66_22');
      const data = await res.json();
      if (data.ok && data.token) {
        window.location.href = '/key?token=' + data.token;
      } else {
        document.getElementById('error').style.display = 'block';
        document.getElementById('spinner').style.display = 'none';
        if (data.debug && data.debug.includes('limit exceeded')) {
          document.getElementById('error').textContent = 'Daily limit reached. Try again in 24h.';
        }
      }
    } catch(e) {
      document.getElementById('error').style.display = 'block';
      document.getElementById('spinner').style.display = 'none';
    }
  }
  window.onload = getToken;
</script>
</body>
</html>
