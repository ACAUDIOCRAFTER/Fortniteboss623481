<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AC AudioCrafter — Tag Manager</title>
<style>
  :root {
    --bg: #06060a;
    --card: #0e0e16;
    --border: #2a2a3a;
    --accent: #9600c8;
    --accent2: #c800ff;
    --green: #50dc78;
    --red: #dc5050;
    --text: #ffffff;
    --dim: #a09ab0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
  }

  /* Animated glow border on top */
  body::before {
    content: '';
    display: block;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), var(--accent), transparent);
    background-size: 200% 100%;
    animation: borderFlow 3s linear infinite;
  }
  @keyframes borderFlow { 0%{background-position:0% 0%} 100%{background-position:200% 0%} }

  header {
    padding: 28px 32px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: bold; color: white;
  }
  header h1 { font-size: 18px; letter-spacing: 1px; }
  header p  { font-size: 11px; color: var(--dim); margin-top: 2px; }

  .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

  .section-title {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Add user form */
  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
  }
  .form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }

  .field label {
    display: block;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .field input, .field select {
    width: 100%;
    background: #0a0a12;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color .2s;
  }
  .field input:focus, .field select:focus {
    border-color: var(--accent);
  }
  .field input::placeholder { color: #444; }

  /* Preview strip */
  .preview-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
    padding: 12px 14px;
    background: #09090f;
    border: 1px solid var(--border);
    border-radius: 8px;
    min-height: 56px;
  }
  .tag-preview {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(150,0,200,.15);
    border: 1px solid var(--accent);
    border-radius: 24px;
    padding: 5px 12px 5px 5px;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: .5px;
    position: relative;
  }
  .tag-pfp {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--border);
    overflow: hidden;
    flex-shrink: 0;
  }
  .tag-pfp img { width: 100%; height: 100%; object-fit: cover; }
  .tag-label { color: var(--text); font-size: 11px; }
  .tag-display { color: var(--dim); font-size: 10px; }

  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

  button {
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: .5px;
    transition: all .15s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(150,0,200,.4); }
  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--text); }
  .btn-danger {
    background: transparent;
    border: 1px solid #4a1818;
    color: var(--red);
    padding: 6px 12px;
    font-size: 11px;
  }
  .btn-danger:hover { background: rgba(220,80,80,.1); }

  /* Users table */
  .users-grid { display: flex; flex-direction: column; gap: 8px; }

  .user-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color .2s;
  }
  .user-row:hover { border-color: rgba(150,0,200,.4); }

  .user-pfp {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--border);
    overflow: hidden;
    flex-shrink: 0;
    border: 2px solid var(--accent);
  }
  .user-pfp img { width: 100%; height: 100%; object-fit: cover; }

  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; font-weight: bold; }
  .user-meta { font-size: 10px; color: var(--dim); margin-top: 2px; }

  .user-tag-badge {
    background: rgba(150,0,200,.2);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 3px 10px;
    font-size: 10px;
    color: var(--accent2);
    white-space: nowrap;
  }

  .user-actions { display: flex; gap: 6px; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 12px;
    transition: transform .3s ease, opacity .3s;
    opacity: 0;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.ok  { border-color: var(--green); color: var(--green); }
  #toast.err { border-color: var(--red);   color: var(--red);   }

  /* Auth overlay */
  #auth-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.92);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .auth-box {
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 14px;
    padding: 36px 32px;
    width: 320px;
    text-align: center;
  }
  .auth-box h2 { font-size: 16px; margin-bottom: 8px; }
  .auth-box p  { font-size: 11px; color: var(--dim); margin-bottom: 20px; }
  .auth-box input {
    width: 100%;
    background: #0a0a12;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    outline: none;
    margin-bottom: 12px;
    text-align: center;
    letter-spacing: 2px;
  }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--dim);
    font-size: 12px;
  }

  @media (max-width: 600px) {
    .form-grid, .form-grid.three { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- Auth overlay -->
<div id="auth-overlay">
  <div class="auth-box">
    <div class="logo" style="margin: 0 auto 16px; width:48px;height:48px;font-size:22px;">AC</div>
    <h2>AC AudioCrafter</h2>
    <p>Enter your admin password to continue</p>
    <input type="password" id="auth-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkAuth()"/>
    <button class="btn-primary" style="width:100%" onclick="checkAuth()">ENTER</button>
    <p id="auth-err" style="color:var(--red);font-size:10px;margin-top:10px;display:none">Wrong password</p>
  </div>
</div>

<header>
  <div class="logo">AC</div>
  <div>
    <h1>AC AUDIOCRAFTER — TAG MANAGER</h1>
    <p>Manage custom nametags for your whitelisted users</p>
  </div>
</header>

<div class="container">

  <!-- Add user form -->
  <div class="section-title">Add / Edit User</div>
  <div class="form-card">
    <div class="form-grid">
      <div class="field">
        <label>Roblox Username</label>
        <input type="text" id="f-username" placeholder="e.g. Exhalivibes" oninput="updatePreview()"/>
      </div>
      <div class="field">
        <label>Tag Label</label>
        <input type="text" id="f-tag" placeholder="e.g. CO-OWNER" oninput="updatePreview()"/>
      </div>
    </div>
    <div class="form-grid three">
      <div class="field">
        <label>PFP Asset ID <span style="color:var(--dim)">(blank = none)</span></label>
        <input type="text" id="f-pfp" placeholder="e.g. 113979242243283" oninput="updatePreview()"/>
      </div>
      <div class="field">
        <label>Background Asset ID <span style="color:var(--dim)">(blank = none)</span></label>
        <input type="text" id="f-bg" placeholder="e.g. 97099238046338" oninput="updatePreview()"/>
      </div>
      <div class="field">
        <label>Role</label>
        <select id="f-role">
          <option value="owner">Owner</option>
          <option value="co-owner">Co-Owner</option>
          <option value="admin">Admin</option>
          <option value="user" selected>User</option>
          <option value="custom">Custom</option>
        </select>
      </div>
    </div>

    <!-- Live preview -->
    <div class="preview-row">
      <span style="font-size:10px;color:var(--dim);white-space:nowrap">PREVIEW</span>
      <div class="tag-preview" id="tag-preview">
        <div class="tag-pfp" id="preview-pfp-wrap">
          <img id="preview-pfp" src="" style="display:none"/>
        </div>
        <div>
          <div class="tag-label" id="preview-label">AC USER</div>
          <div class="tag-display" id="preview-uname">@username</div>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-primary" onclick="saveUser()">💾 SAVE USER</button>
      <button class="btn-secondary" onclick="clearForm()">CLEAR</button>
    </div>
  </div>

  <!-- User list -->
  <div class="section-title">Whitelisted Users</div>
  <div id="users-container" class="users-grid">
    <div class="empty-state">Loading users...</div>
  </div>

</div>

<div id="toast"></div>

<script>
const API = '/api/custom-users'
const ADMIN_PASS = localStorage.getItem('ac_pass') || ''
let users = {}
let authed = false

// ── Auth
function checkAuth() {
  const val = document.getElementById('auth-input').value
  fetch('/api/custom-users?auth=' + encodeURIComponent(val))
    .then(r => r.json())
    .then(d => {
      if (d.ok) {
        authed = true
        localStorage.setItem('ac_pass', val)
        window._pass = val
        document.getElementById('auth-overlay').style.display = 'none'
        loadUsers()
      } else {
        document.getElementById('auth-err').style.display = 'block'
      }
    })
    .catch(() => {
      document.getElementById('auth-err').style.display = 'block'
    })
}

// Auto-auth if password saved
window.onload = () => {
  const saved = localStorage.getItem('ac_pass')
  if (saved) {
    window._pass = saved
    document.getElementById('auth-input').value = saved
    checkAuth()
  }
}

// ── Load users
function loadUsers() {
  fetch(API + '?auth=' + encodeURIComponent(window._pass))
    .then(r => r.json())
    .then(d => {
      if (d.ok) { users = d.users || {}; renderUsers() }
    })
}

// ── Render user list
function renderUsers() {
  const el = document.getElementById('users-container')
  const keys = Object.keys(users)
  if (!keys.length) {
    el.innerHTML = '<div class="empty-state">No users added yet. Use the form above to add one.</div>'
    return
  }
  el.innerHTML = keys.map(username => {
    const u = users[username]
    const pfpUrl = u.pfpId ? `https://assetdelivery.roblox.com/v1/asset/?id=${u.pfpId}` : ''
    return `
    <div class="user-row">
      <div class="user-pfp">
        ${pfpUrl ? `<img src="${pfpUrl}" onerror="this.style.display='none'"/>` : ''}
      </div>
      <div class="user-info">
        <div class="user-name">${username}</div>
        <div class="user-meta">
          PFP: ${u.pfpId || '—'} &nbsp;|&nbsp; BG: ${u.bgId || '—'}
        </div>
      </div>
      <div class="user-tag-badge">${u.tag}</div>
      <div class="user-actions">
        <button class="btn-secondary" style="padding:6px 12px;font-size:11px" onclick="editUser('${username}')">EDIT</button>
        <button class="btn-danger" onclick="deleteUser('${username}')">✕</button>
      </div>
    </div>`
  }).join('')
}

// ── Preview
function updatePreview() {
  const tag = document.getElementById('f-tag').value || 'AC USER'
  const uname = document.getElementById('f-username').value || 'username'
  const pfpId = document.getElementById('f-pfp').value.trim()
  document.getElementById('preview-label').textContent = tag
  document.getElementById('preview-uname').textContent = '@' + uname
  const pfpImg = document.getElementById('preview-pfp')
  if (pfpId) {
    pfpImg.src = `https://assetdelivery.roblox.com/v1/asset/?id=${pfpId}`
    pfpImg.style.display = 'block'
  } else {
    pfpImg.style.display = 'none'
  }
}

// ── Save user
function saveUser() {
  const username = document.getElementById('f-username').value.trim()
  const tag = document.getElementById('f-tag').value.trim()
  const pfpId = document.getElementById('f-pfp').value.trim()
  const bgId = document.getElementById('f-bg').value.trim()
  if (!username || !tag) { toast('Username and tag label are required', 'err'); return }

  fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ auth: window._pass, action: 'set', username, tag, pfpId, bgId })
  })
  .then(r => r.json())
  .then(d => {
    if (d.ok) {
      users[username] = { tag, pfpId, bgId }
      renderUsers()
      clearForm()
      toast('Saved! Script will pick up changes within 10s', 'ok')
    } else {
      toast(d.error || 'Save failed', 'err')
    }
  })
  .catch(e => toast('Network error', 'err'))
}

// ── Edit
function editUser(username) {
  const u = users[username]
  document.getElementById('f-username').value = username
  document.getElementById('f-tag').value = u.tag
  document.getElementById('f-pfp').value = u.pfpId || ''
  document.getElementById('f-bg').value = u.bgId || ''
  updatePreview()
  window.scrollTo({ top: 0, behavior: 'smooth' })
}

// ── Delete
function deleteUser(username) {
  if (!confirm(`Remove ${username} from the whitelist?`)) return
  fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ auth: window._pass, action: 'delete', username })
  })
  .then(r => r.json())
  .then(d => {
    if (d.ok) {
      delete users[username]
      renderUsers()
      toast(`${username} removed`, 'ok')
    } else toast(d.error || 'Delete failed', 'err')
  })
}

function clearForm() {
  ['f-username','f-tag','f-pfp','f-bg'].forEach(id => document.getElementById(id).value = '')
  updatePreview()
}

function toast(msg, type) {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.className = 'show ' + (type || '')
  setTimeout(() => el.className = '', 3000)
}
</script>
</body>
</html>
