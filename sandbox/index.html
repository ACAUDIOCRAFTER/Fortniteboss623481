<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Lua Testing Environment</title>
    <style>
        :root {
            --bg: #0d1117;
            --panel-bg: #161b22;
            --border: #21262d;
            --text: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-glow: #58a6ff44;
            --red: #f85149;
            --red-bg: #f8514922;
            --green: #3fb950;
            --green-bg: #3fb95022;
            --yellow: #d2991d;
            --yellow-bg: #d2991d22;
            --orange: #f0883e;
            --divider: #30363d;
            --toolbar-bg: #0d1117;
            --input-bg: #0d1117;
            --scrollbar-thumb: #30363d;
            --scrollbar-track: #161b22;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
            --font-sans: 'SF Pro Display', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            --radius: 8px;
            --radius-sm: 4px;
            --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
        }

        /* ─── TOOLBAR ─────────────────────── */
        .toolbar {
            background: var(--toolbar-bg);
            border-bottom: 1px solid var(--border);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            z-index: 10;
            min-height: 48px;
        }
        .toolbar .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 14px;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .toolbar .logo .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                box-shadow: 0 0 8px var(--accent-glow);
            }
            50% {
                box-shadow: 0 0 18px var(--accent), 0 0 30px var(--accent-glow);
            }
        }
        .toolbar .spacer {
            flex: 1;
        }
        .toolbar button {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 7px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            font-family: var(--font-sans);
            letter-spacing: 0.2px;
            transition: all var(--transition);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .toolbar button:hover {
            background: #1f2937;
            border-color: #4a5568;
            transform: translateY(-1px);
        }
        .toolbar button:active {
            transform: scale(0.97);
            transition: 50ms;
        }
        .toolbar button.execute-btn {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 600;
            box-shadow: 0 0 16px var(--accent-glow);
        }
        .toolbar button.execute-btn:hover {
            background: #4090e0;
            box-shadow: 0 0 22px var(--accent-glow), 0 4px 12px #00000044;
        }
        .toolbar button.clear-btn {
            background: transparent;
            border-color: #444;
            color: #aaa;
        }
        .toolbar button.clear-btn:hover {
            border-color: #888;
            color: #fff;
        }
        .toolbar .badge {
            background: #1a1f2b;
            border: 1px solid #2a3040;
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 11px;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            letter-spacing: 0.3px;
        }

        /* ─── MAIN CONTAINER ─────────────── */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* ─── LEFT PANEL (EXECUTOR) ─────── */
        .panel-executor {
            background: var(--panel-bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            min-width: 200px;
        }
        .panel-header {
            padding: 10px 14px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0d111722;
        }
        .panel-header .icon {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .panel-header .icon.exec {
            background: #f0883e;
            box-shadow: 0 0 6px #f0883e66;
        }
        .panel-header .icon.game {
            background: #3fb950;
            box-shadow: 0 0 6px #3fb95066;
        }
        .panel-header .icon.console {
            background: #58a6ff;
            box-shadow: 0 0 6px #58a6ff66;
        }

        /* Code editor area */
        .editor-wrapper {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }
        .line-numbers {
            background: #0d1117;
            color: #3a4455;
            padding: 14px 8px 14px 12px;
            text-align: right;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.65;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
            min-width: 40px;
            border-right: 1px solid #1a1f2b;
            letter-spacing: 0;
            white-space: pre;
        }
        .editor-textarea {
            flex: 1;
            background: var(--input-bg);
            color: #e6edf3;
            border: none;
            padding: 14px 16px;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.65;
            resize: none;
            outline: none;
            tab-size: 4;
            letter-spacing: 0.2px;
            overflow: auto;
            caret-color: #58a6ff;
        }
        .editor-textarea::selection {
            background: #58a6ff44;
        }
        .editor-textarea::-webkit-scrollbar {
            width: 6px;
        }
        .editor-textarea::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }
        .editor-textarea::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 3px;
        }

        /* ─── RIGHT SIDE (GAME VIEW + CONSOLE) ─── */
        .panel-right {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            min-width: 200px;
        }
        .panel-game {
            background: var(--panel-bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            min-height: 150px;
        }
        .game-canvas-container {
            flex: 1;
            position: relative;
            background: #0a0d13;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .game-canvas-container canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .game-overlay {
            position: absolute;
            top: 10px;
            right: 14px;
            font-size: 10px;
            color: #ffffff55;
            font-family: var(--font-mono);
            letter-spacing: 0.5px;
            pointer-events: none;
            text-shadow: 0 0 8px #000;
        }

        .panel-console {
            background: #0b0e14;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 80px;
            border-top: 1px solid var(--border);
        }
        .console-output {
            flex: 1;
            overflow-y: auto;
            padding: 10px 14px;
            font-family: var(--font-mono);
            font-size: 12px;
            line-height: 1.55;
            letter-spacing: 0.2px;
            background: #0b0e14;
        }
        .console-output::-webkit-scrollbar {
            width: 5px;
        }
        .console-output::-webkit-scrollbar-track {
            background: transparent;
        }
        .console-output::-webkit-scrollbar-thumb {
            background: #252a33;
            border-radius: 3px;
        }
        .console-line {
            padding: 3px 0;
            border-bottom: 1px solid #ffffff04;
            animation: fadeInLine 0.25s ease-out;
        }
        @keyframes fadeInLine {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .console-line .timestamp {
            color: #555;
            margin-right: 8px;
            font-size: 10px;
        }
        .console-line.error {
            color: var(--red);
            background: var(--red-bg);
            border-radius: 3px;
            padding: 4px 8px;
            margin: 2px 0;
            border-left: 3px solid var(--red);
        }
        .console-line.warn {
            color: var(--yellow);
            background: var(--yellow-bg);
            border-radius: 3px;
            padding: 4px 8px;
            margin: 2px 0;
            border-left: 3px solid var(--yellow);
        }
        .console-line.success {
            color: var(--green);
            background: var(--green-bg);
            border-radius: 3px;
            padding: 4px 8px;
            margin: 2px 0;
            border-left: 3px solid var(--green);
        }
        .console-line.info {
            color: #8b949e;
        }
        .console-placeholder {
            color: #2a3040;
            font-style: italic;
            padding: 20px;
            text-align: center;
            font-size: 13px;
        }

        /* ─── DRAG DIVIDERS ──────────────── */
        .divider-vertical {
            width: 6px;
            cursor: col-resize;
            background: var(--border);
            flex-shrink: 0;
            position: relative;
            z-index: 5;
            transition: background var(--transition);
        }
        .divider-vertical:hover,
        .divider-vertical.active {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }
        .divider-vertical::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 2px;
            height: 30px;
            background: #ffffff44;
            border-radius: 1px;
            opacity: 0;
            transition: opacity var(--transition);
        }
        .divider-vertical:hover::after,
        .divider-vertical.active::after {
            opacity: 1;
        }

        .divider-horizontal {
            height: 6px;
            cursor: row-resize;
            background: var(--border);
            flex-shrink: 0;
            position: relative;
            z-index: 5;
            transition: background var(--transition);
        }
        .divider-horizontal:hover,
        .divider-horizontal.active {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }
        .divider-horizontal::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 2px;
            background: #ffffff44;
            border-radius: 1px;
            opacity: 0;
            transition: opacity var(--transition);
        }
        .divider-horizontal:hover::after,
        .divider-horizontal.active::after {
            opacity: 1;
        }

        /* ─── GHOST LINE DURING DRAG ────── */
        .drag-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            background: var(--accent);
            opacity: 0.6;
            transition: none;
        }

        /* ─── RESPONSIVE ────────────────── */
        @media (max-width: 768px) {
            .toolbar {
                padding: 6px 10px;
                gap: 6px;
                flex-wrap: wrap;
                min-height: auto;
            }
            .toolbar button {
                padding: 5px 10px;
                font-size: 11px;
            }
            .toolbar .badge {
                display: none;
            }
            .main-container {
                flex-direction: column;
            }
            .divider-vertical {
                width: 100%;
                height: 6px;
                cursor: row-resize;
            }
            .panel-executor {
                min-width: unset;
                min-height: 180px;
            }
            .panel-right {
                min-width: unset;
                min-height: 250px;
            }
        }
    </style>
</head>
<body>

    <!-- ─── TOOLBAR ─────────────────────────── -->
    <div class="toolbar">
        <div class="logo">
            <div class="dot"></div>
            <span>Lua Sandbox</span>
        </div>
        <span class="badge">v0.1.0</span>
        <span class="badge" style="color:#f0883e;">Roblox Emulation</span>
        <div class="spacer"></div>
        <button class="clear-btn" onclick="clearEditor()" title="Clear editor (Ctrl+Shift+X)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            Clear
        </button>
        <button class="execute-btn" onclick="executeCode()" title="Execute (Ctrl+Enter)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
            Execute
        </button>
    </div>

    <!-- ─── MAIN CONTENT ───────────────────── -->
    <div class="main-container" id="mainContainer">

        <!-- LEFT: Executor Panel -->
        <div class="panel-executor" id="panelExecutor" style="flex: 0 0 42%;">
            <div class="panel-header">
                <span class="icon exec"></span> Executor — Lua Code
                <span style="margin-left:auto;font-size:10px;color:#555;">Ctrl+Enter to run</span>
            </div>
            <div class="editor-wrapper">
                <div class="line-numbers" id="lineNumbers">1</div>
                <textarea
                class="editor-textarea"
                id="codeEditor"
                placeholder="-- Paste your Lua code here...&#10;-- Example:&#10;local part = Instance.new(&quot;Part&quot;)&#10;part.Name = &quot;TestPart&quot;&#10;part.Parent = workspace&#10;print(&quot;Hello from Roblox!&quot;)"
                spellcheck="false"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
            >-- Welcome to Lua Sandbox! 🚀
                -- Paste your Lua code below and press Execute
                -- The console will check for real syntax errors

                local function greet(name)
                if not name then
                error("Name cannot be nil!")
                end
                return "Hello, " .. name .. "!"
                end

                print(greet("Developer"))
                print("Code executed successfully!")</textarea>
            </div>
        </div>

        <!-- Vertical Divider -->
        <div class="divider-vertical" id="dividerVertical" title="Drag to resize panels"></div>

        <!-- RIGHT: Game View + Console -->
        <div class="panel-right" id="panelRight" style="flex: 0 0 calc(58% - 6px);">
            <!-- Game View -->
            <div class="panel-game" id="panelGame" style="flex: 0 0 58%;">
                <div class="panel-header">
                    <span class="icon game"></span> Game View — Roblox Emulation
                </div>
                <div class="game-canvas-container" id="gameCanvasContainer">
                    <canvas id="gameCanvas"></canvas>
                    <div class="game-overlay" id="gameOverlay">FPS: 60 | Place: Sandbox Place</div>
                </div>
            </div>

            <!-- Horizontal Divider -->
            <div class="divider-horizontal" id="dividerHorizontal" title="Drag to resize panels"></div>

            <!-- Console -->
            <div class="panel-console" id="panelConsole" style="flex: 0 0 calc(42% - 6px);">
                <div class="panel-header">
                    <span class="icon console"></span> Console Output
                    <span style="margin-left:auto;font-size:10px;color:#555;">Errors & Warnings</span>
                </div>
                <div class="console-output" id="consoleOutput">
                    <div class="console-placeholder">⚡ Console ready. Paste your Lua code in the Executor and press <strong>Execute</strong> to test for errors.</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ─── DRAG GHOST ELEMENT ─────────────── -->
    <div class="drag-ghost" id="dragGhost" style="display:none;"></div>

    <script>
        (function() {
            // ───────────────────────────────────
            // DOM REFERENCES
            // ───────────────────────────────────
            const mainContainer = document.getElementById('mainContainer');
            const panelExecutor = document.getElementById('panelExecutor');
            const panelRight = document.getElementById('panelRight');
            const panelGame = document.getElementById('panelGame');
            const panelConsole = document.getElementById('panelConsole');
            const dividerVertical = document.getElementById('dividerVertical');
            const dividerHorizontal = document.getElementById('dividerHorizontal');
            const codeEditor = document.getElementById('codeEditor');
            const lineNumbers = document.getElementById('lineNumbers');
            const consoleOutput = document.getElementById('consoleOutput');
            const gameCanvas = document.getElementById('gameCanvas');
            const gameCanvasContainer = document.getElementById('gameCanvasContainer');
            const gameOverlay = document.getElementById('gameOverlay');
            const dragGhost = document.getElementById('dragGhost');

            // ───────────────────────────────────
            // LINE NUMBERS SYNC
            // ───────────────────────────────────
            function updateLineNumbers() {
                const lines = codeEditor.value.split('\n');
                const count = lines.length;
                let html = '';
                for (let i = 1; i <= count; i++) {
                    html += i + '\n';
                }
                lineNumbers.textContent = html || '1';
                // Sync scroll
                lineNumbers.scrollTop = codeEditor.scrollTop;
            }

            codeEditor.addEventListener('input', updateLineNumbers);
            codeEditor.addEventListener('scroll', () => {
                lineNumbers.scrollTop = codeEditor.scrollTop;
            });
            codeEditor.addEventListener('keydown', (e) => {
                // Tab key support
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const start = codeEditor.selectionStart;
                    const end = codeEditor.selectionEnd;
                    const value = codeEditor.value;
                    codeEditor.value = value.substring(0, start) + '    ' + value.substring(end);
                    codeEditor.selectionStart = codeEditor.selectionEnd = start + 4;
                    updateLineNumbers();
                }
                // Ctrl+Enter to execute
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    executeCode();
                }
                // Ctrl+Shift+X to clear
                if (e.key === 'X' && e.shiftKey && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    clearEditor();
                }
            });

            // Initial line numbers
            updateLineNumbers();

            // ───────────────────────────────────
            // CLEAR EDITOR
            // ───────────────────────────────────
            window.clearEditor = function() {
                codeEditor.value = '';
                updateLineNumbers();
                codeEditor.focus();
                addConsoleLine('info', 'Editor cleared.');
            };

            // ───────────────────────────────────
            // LUA SYNTAX CHECKER
            // ───────────────────────────────────
            function checkLuaSyntax(code) {
                const errors = [];
                const warnings = [];
                const lines = code.split('\n');

                // Track bracket/block state
                let parenDepth = 0;
                let bracketDepth = 0;
                let braceDepth = 0;
                let inString = null; // null, '"', "'", or '[['
                let inBlockComment = false;
                let blockCommentLevel = 0;
                let endStack = []; // Track expected 'end' keywords: 'function','if','do','while','for','repeat'

                for (let lineIdx = 0; lineIdx < lines.length; lineIdx++) {
                    const rawLine = lines[lineIdx];
                    const lineNum = lineIdx + 1;
                    let i = 0;
                    const line = rawLine;

                    // Skip if inside block comment
                    if (inBlockComment) {
                        const endCommentIdx = line.indexOf(']]');
                        if (endCommentIdx !== -1) {
                            inBlockComment = false;
                            i = endCommentIdx + 2;
                        } else {
                            continue;
                        }
                    }

                    while (i < line.length) {
                        const char = line[i];
                        const nextChar = line[i + 1] || '';
                        const prevChar = line[i - 1] || '';

                        // Check for block comment start
                        if (!inString && char === '-' && nextChar === '-' && line[i + 2] === '[' && line[i + 3] ===
                            '[') {
                            inBlockComment = true;
                            const endCommentIdx = line.indexOf(']]', i + 4);
                            if (endCommentIdx !== -1) {
                                inBlockComment = false;
                                i = endCommentIdx + 2;
                            } else {
                                break;
                            }
                            continue;
                        }

                        // Check for single-line comment
                        if (!inString && char === '-' && nextChar === '-' && line[i + 2] !== '[') {
                            break; // Rest of line is comment
                        }

                        // String handling
                        if (!inString && !inBlockComment) {
                            if (char === '"' || char === "'") {
                                inString = char;
                                i++;
                                continue;
                            }
                            if (char === '[' && nextChar === '[') {
                                inString = '[[';
                                i += 2;
                                continue;
                            }
                        } else if (inString === '[[') {
                            if (char === ']' && nextChar === ']') {
                                inString = null;
                                i += 2;
                                continue;
                            }
                            i++;
                            continue;
                        } else if (inString === '"' || inString === "'") {
                            if (char === '\\') {
                                i += 2; // Skip escape sequence
                                continue;
                            }
                            if (char === inString) {
                                inString = null;
                                i++;
                                continue;
                            }
                            i++;
                            continue;
                        }

                        // Track brackets
                        if (!inString && !inBlockComment) {
                            if (char === '(') parenDepth++;
                            if (char === ')') {
                                parenDepth--;
                                if (parenDepth < 0) {
                                    errors.push({
                                        line: lineNum,
                                        col: i,
                                        msg: 'Unexpected closing parenthesis ")" — no matching opening parenthesis.'
                                    });
                                    parenDepth = 0;
                                }
                            }
                            if (char === '[') bracketDepth++;
                            if (char === ']') {
                                bracketDepth--;
                                if (bracketDepth < 0) {
                                    errors.push({
                                        line: lineNum,
                                        col: i,
                                        msg: 'Unexpected closing bracket "]" — no matching opening bracket.'
                                    });
                                    bracketDepth = 0;
                                }
                            }
                            if (char === '{') braceDepth++;
                            if (char === '}') {
                                braceDepth--;
                                if (braceDepth < 0) {
                                    errors.push({
                                        line: lineNum,
                                        col: i,
                                        msg: 'Unexpected closing brace "}" — no matching opening brace.'
                                    });
                                    braceDepth = 0;
                                }
                            }
                        }

                        i++;
                    }

                    // Check for keywords that push to endStack
                    if (!inString && !inBlockComment) {
                        const trimmed = line.replace(/--.*$/, '').trim();
                        const words = trimmed.split(/\s+/);

                        // Simple keyword detection for block starters
                        const keywordCheck = trimmed.replace(/\([^)]*\)/g, '').replace(/".*?"/g, '').replace(/'.*?'/g, '');
                        const firstWord = words[0] || '';

                        // Track function, if, do, while, for
                        if (/\bfunction\b/.test(keywordCheck) && !/\bend\b/.test(trimmed.split('--')[0])) {
                            endStack.push({ type: 'function', line: lineNum });
                        }
                        if (/\bif\b/.test(keywordCheck) && /\bthen\b/.test(keywordCheck) && !/\bend\b/.test(trimmed.split(
                                '--')[0])) {
                            endStack.push({ type: 'if', line: lineNum });
                        }
                        if (/\bfor\b/.test(keywordCheck) && /\bdo\b/.test(keywordCheck) && !/\bend\b/.test(trimmed.split(
                                '--')[0])) {
                            endStack.push({ type: 'for', line: lineNum });
                        }
                        if (/\bwhile\b/.test(keywordCheck) && /\bdo\b/.test(keywordCheck) && !/\bend\b/.test(trimmed.split(
                                '--')[0])) {
                            endStack.push({ type: 'while', line: lineNum });
                        }
                        if (/\bdo\b/.test(keywordCheck) && !/\bend\b/.test(trimmed.split('--')[0]) && !/\bfunction\b/.test(
                                keywordCheck) && !/\bfor\b/.test(keywordCheck) && !/\bwhile\b/.test(keywordCheck)) {
                            endStack.push({ type: 'do', line: lineNum });
                        }
                        if (/\brepeat\b/.test(keywordCheck)) {
                            endStack.push({ type: 'repeat', line: lineNum });
                        }

                        // Check for 'end' keyword
                        if (/\bend\b/.test(keywordCheck)) {
                            if (endStack.length === 0) {
                                errors.push({
                                    line: lineNum,
                                    col: 0,
                                    msg: 'Unexpected "end" — no matching block to close. Every "end" must correspond to a function, if, do, while, for, or repeat block.'
                                });
                            } else {
                                endStack.pop();
                            }
                        }

                        // Check for 'until' (closes repeat)
                        if (/\buntil\b/.test(keywordCheck)) {
                            // Find and remove the most recent 'repeat' from stack
                            const repeatIdx = endStack.findLastIndex ? endStack.findLastIndex(e => e.type ===
                                'repeat') : [...endStack].reverse().findIndex(e => e.type === 'repeat');
                            if (repeatIdx === -1 || (endStack.findLastIndex && repeatIdx === -1)) {
                                // No matching repeat
                                const actualIdx = [...endStack].reverse().findIndex(e => e.type === 'repeat');
                                if (actualIdx === -1) {
                                    errors.push({
                                        line: lineNum,
                                        col: 0,
                                        msg: 'Unexpected "until" — no matching "repeat" block found.'
                                    });
                                } else {
                                    endStack.splice(endStack.length - 1 - actualIdx, 1);
                                }
                            } else {
                                if (endStack.findLastIndex) {
                                    endStack.splice(repeatIdx, 1);
                                } else {
                                    const idx = endStack.length - 1 - [...endStack].reverse().findIndex(e => e.type ===
                                        'repeat');
                                    endStack.splice(idx, 1);
                                }
                            }
                        }
                    }
                }

                // After all lines, check for unclosed strings
                if (inString) {
                    errors.push({
                        line: lines.length,
                        col: 0,
                        msg: `Unclosed string: missing ${inString === '[[' ? ']]' : inString} to close the string.`
                    });
                }
                if (inBlockComment) {
                    errors.push({
                        line: lines.length,
                        col: 0,
                        msg: 'Unclosed block comment: missing ]] to close --[[ comment.'
                    });
                }

                // Check remaining brackets
                if (parenDepth > 0) {
                    errors.push({
                        line: lines.length,
                        col: 0,
                        msg: `Unclosed parenthesis: ${parenDepth} opening "(" without matching ")".`
                    });
                }
                if (bracketDepth > 0) {
                    errors.push({
                        line: lines.length,
                        col: 0,
                        msg: `Unclosed bracket: ${bracketDepth} opening "[" without matching "]".`
                    });
                }
                if (braceDepth > 0) {
                    errors.push({
                        line: lines.length,
                        col: 0,
                        msg: `Unclosed brace: ${braceDepth} opening "{" without matching "}".`
                    });
                }

                // Check remaining endStack
                if (endStack.length > 0) {
                    for (const block of endStack) {
                        errors.push({
                            line: block.line,
                            col: 0,
                            msg: `Missing "end" for ${block.type} block started on line ${block.line}. Every ${block.type} block must be closed with "end".`
                        });
                    }
                }

                // Check for common Roblox-specific issues
                const fullCode = code.toLowerCase();
                if (/\bgame\.getservice\b/.test(fullCode) && !/\bgame:getservice\b/.test(fullCode)) {
                    warnings.push({
                        line: 1,
                        col: 0,
                        msg: 'Roblox API note: Use colon syntax: game:GetService("ServiceName") — not dot syntax.'
                    });
                }
                if (/\bworkspace\.\w+\(/.test(fullCode)) {
                    warnings.push({
                        line: 1,
                        col: 0,
                        msg: 'Roblox API note: Methods on Roblox objects use colon syntax (e.g., part:Destroy(), not part.Destroy()).'
                    });
                }

                // Check for 'else' without 'if'
                const elseCheck = code.replace(/--.*$/gm, '').replace(/".*?"/g, '').replace(/'.*?'/g, '').replace(
                    /--\[\[[\s\S]*?\]\]/g, '');
                if (/\belse\b/.test(elseCheck) && !/\bif\b/.test(elseCheck)) {
                    errors.push({
                        line: 1,
                        col: 0,
                        msg: '"else" found without a matching "if" statement.'
                    });
                }
                if (/\belseif\b/.test(elseCheck) && !/\bif\b/.test(elseCheck)) {
                    errors.push({
                        line: 1,
                        col: 0,
                        msg: '"elseif" found without a matching "if" statement.'
                    });
                }

                return { errors, warnings };
            }

            // ───────────────────────────────────
            // EXECUTE CODE
            // ───────────────────────────────────
            window.executeCode = function() {
                const code = codeEditor.value.trim();

                if (!code) {
                    addConsoleLine('warn', 'No code to execute. Please paste some Lua code first.');
                    return;
                }

                // Clear previous output
                consoleOutput.innerHTML = '';

                const timestamp = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit',
                    minute: '2-digit', second: '2-digit' });

                addConsoleLine('info', `⏳ Analyzing Lua code (${code.split('\n').length} lines, ${code.length} chars)...`);

                // Small delay for dramatic effect
                setTimeout(() => {
                    const result = checkLuaSyntax(code);

                    if (result.errors.length === 0 && result.warnings.length === 0) {
                        addConsoleLine('success',
                            `✅ Syntax check passed! Code is valid Lua. (${code.split('\n').length} lines analyzed)`);
                        addConsoleLine('info',
                            '📝 Note: This is a syntax checker only. Runtime behavior is not simulated. Test in Roblox Studio for full validation.'
                        );

                        // Simulate some fake output for immersion
                        const printMatches = code.match(/print\s*\(\s*["'](.+?)["']\s*\)/g);
                        if (printMatches) {
                            for (const match of printMatches) {
                                const contentMatch = match.match(/print\s*\(\s*["'](.+?)["']\s*\)/);
                                if (contentMatch) {
                                    addConsoleLine('info',
                                        `🖨️  Output: <span style="color:#e6edf3;">${escapeHtml(contentMatch[1])}</span>`);
                                }
                            }
                        }

                        // Flash the game view green briefly
                        flashGameView('#3fb950');
                    } else {
                        if (result.errors.length > 0) {
                            addConsoleLine('error',
                                `❌ Found ${result.errors.length} error(s) in your code:`);
                            for (const err of result.errors) {
                                addConsoleLine('error',
                                    `  Line ${err.line}: ${escapeHtml(err.msg)}`);
                            }
                            flashGameView('#f85149');
                        }
                        if (result.warnings.length > 0) {
                            for (const warn of result.warnings) {
                                addConsoleLine('warn', `⚠️  Line ${warn.line}: ${escapeHtml(warn.msg)}`);
                            }
                        }
                        if (result.errors.length === 0 && result.warnings.length > 0) {
                            addConsoleLine('success', '✅ No syntax errors found, but see warnings above.');
                        }
                    }
                }, 150);
            };

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function addConsoleLine(type, message) {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'console-line ' + type;
                const ts = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit',
                    second: '2-digit' });
                lineDiv.innerHTML = `<span class="timestamp">[${ts}]</span>${message}`;
                consoleOutput.appendChild(lineDiv);
                consoleOutput.scrollTop = consoleOutput.scrollHeight;
            }

            function flashGameView(color) {
                const overlay = document.getElementById('gameOverlay');
                const originalText = overlay.textContent;
                overlay.style.color = color;
                overlay.style.fontSize = '13px';
                overlay.style.fontWeight = 'bold';
                overlay.textContent = color === '#3fb950' ? '✓ Code Valid' : '✗ Errors Found';
                setTimeout(() => {
                    overlay.style.color = '#ffffff55';
                    overlay.style.fontSize = '10px';
                    overlay.style.fontWeight = 'normal';
                    overlay.textContent = originalText;
                }, 1800);
            }

            // ───────────────────────────────────
            // GAME VIEW CANVAS — ROBLOX SCENE
            // ───────────────────────────────────
            function drawGameScene() {
                const container = gameCanvasContainer;
                const rect = container.getBoundingClientRect();
                const dpr = Math.min(window.devicePixelRatio || 1, 2); // Cap for performance
                const width = rect.width;
                const height = rect.height;

                if (width <= 0 || height <= 0) return;

                gameCanvas.width = width * dpr;
                gameCanvas.height = height * dpr;
                gameCanvas.style.width = width + 'px';
                gameCanvas.style.height = height + 'px';

                const ctx = gameCanvas.getContext('2d');
                ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset
                ctx.scale(dpr, dpr);

                const W = width;
                const H = height;

                // ── Sky gradient ──────────────────
                const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.7);
                skyGrad.addColorStop(0, '#6eb5ff');
                skyGrad.addColorStop(0.45, '#b8d9ff');
                skyGrad.addColorStop(0.75, '#dceaf5');
                skyGrad.addColorStop(1, '#c8dce8');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, W, H);

                // ── Sun ──────────────────────────
                const sunX = W * 0.78;
                const sunY = H * 0.13;
                const sunR = Math.min(W, H) * 0.09;
                const sunGrad = ctx.createRadialGradient(sunX, sunY, sunR * 0.2, sunX, sunY, sunR * 1.8);
                sunGrad.addColorStop(0, '#ffffff');
                sunGrad.addColorStop(0.3, '#fffef5');
                sunGrad.addColorStop(0.7, '#ffe8a0');
                sunGrad.addColorStop(1, '#ffd16600');
                ctx.fillStyle = sunGrad;
                ctx.beginPath();
                ctx.arc(sunX, sunY, sunR * 1.6, 0, Math.PI * 2);
                ctx.fill();

                // ── Clouds ───────────────────────
                function drawCloud(cx, cy, scale) {
                    ctx.fillStyle = '#ffffffdd';
                    ctx.beginPath();
                    const r = 22 * scale;
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.arc(cx + r * 0.9, cy - r * 0.2, r * 0.75, 0, Math.PI * 2);
                    ctx.arc(cx + r * 1.6, cy + r * 0.1, r * 0.7, 0, Math.PI * 2);
                    ctx.arc(cx - r * 0.5, cy + r * 0.15, r * 0.6, 0, Math.PI * 2);
                    ctx.arc(cx + r * 0.5, cy - r * 0.5, r * 0.65, 0, Math.PI * 2);
                    ctx.fill();
                }
                drawCloud(W * 0.18, H * 0.16, 1);
                drawCloud(W * 0.35, H * 0.22, 0.7);
                drawCloud(W * 0.6, H * 0.1, 0.9);
                drawCloud(W * 0.85, H * 0.25, 0.55);

                // ── Distant hills ────────────────
                ctx.fillStyle = '#8db580';
                ctx.beginPath();
                ctx.moveTo(0, H * 0.62);
                ctx.quadraticCurveTo(W * 0.25, H * 0.48, W * 0.5, H * 0.56);
                ctx.quadraticCurveTo(W * 0.7, H * 0.5, W, H * 0.55);
                ctx.lineTo(W, H * 0.72);
                ctx.lineTo(0, H * 0.72);
                ctx.closePath();
                ctx.fill();

                // ── Ground ───────────────────────
                const groundGrad = ctx.createLinearGradient(0, H * 0.6, 0, H);
                groundGrad.addColorStop(0, '#7ab648');
                groundGrad.addColorStop(0.3, '#5d9a3a');
                groundGrad.addColorStop(0.7, '#4a7d2e');
                groundGrad.addColorStop(1, '#3a6122');
                ctx.fillStyle = groundGrad;
                ctx.fillRect(0, H * 0.62, W, H * 0.38);

                // ── Ground texture (small dots) ──
                ctx.fillStyle = '#6ba840';
                for (let i = 0; i < 60; i++) {
                    const gx = Math.random() * W;
                    const gy = H * 0.64 + Math.random() * H * 0.34;
                    ctx.beginPath();
                    ctx.arc(gx, gy, 1.5 + Math.random() * 2.5, 0, Math.PI * 2);
                    ctx.fill();
                }

                // ── Baseplate ────────────────────
                const bpCenterX = W * 0.5;
                const bpY = H * 0.68;
                const bpW = W * 0.55;
                const bpH = H * 0.16;

                // Shadow under baseplate
                ctx.fillStyle = '#00000033';
                ctx.beginPath();
                ctx.moveTo(bpCenterX - bpW * 0.48, bpY + bpH * 0.55);
                ctx.lineTo(bpCenterX + bpW * 0.48, bpY + bpH * 0.55);
                ctx.lineTo(bpCenterX + bpW * 0.44, bpY + bpH * 0.9);
                ctx.lineTo(bpCenterX - bpW * 0.44, bpY + bpH * 0.9);
                ctx.closePath();
                ctx.fill();

                // Baseplate top face (isometric-ish)
                const bpTop = bpY;
                const bpLeft = bpCenterX - bpW * 0.46;
                const bpRight = bpCenterX + bpW * 0.46;
                const bpBottom = bpY + bpH * 0.6;

                ctx.fillStyle = '#c4c4c4';
                ctx.beginPath();
                ctx.moveTo(bpCenterX, bpTop);
                ctx.lineTo(bpRight, bpY + bpH * 0.3);
                ctx.lineTo(bpCenterX, bpBottom);
                ctx.lineTo(bpLeft, bpY + bpH * 0.3);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#a0a0a0';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Baseplate grid lines
                ctx.strokeStyle = '#b0b0b066';
                ctx.lineWidth = 0.8;
                const gridSpacingX = bpW / 10;
                const gridSpacingY = bpH * 0.55 / 6;
                for (let gx = 1; gx < 10; gx++) {
                    const t = gx / 10;
                    const sx = bpLeft + (bpRight - bpLeft) * t;
                    const sy = bpY + bpH * 0.3 * t;
                    const ex = bpLeft + (bpRight - bpLeft) * t;
                    const ey = bpBottom - (bpBottom - (bpY + bpH * 0.3)) * (1 - t) + bpH * 0.3 * t;
                    ctx.beginPath();
                    ctx.moveTo(sx, sy);
                    ctx.lineTo(bpLeft + (bpRight - bpLeft) * t, bpBottom - (bpBottom - (bpY + bpH * 0.3)) * t);
                    ctx.lineTo(bpCenterX + (bpRight - bpCenterX) * (t - 0.5) * 2, bpY + bpH * 0.3 * (1 - Math.abs(t - 0.5) *
                        2));
                    ctx.stroke();
                }

                // Baseplate front edge highlight
                ctx.fillStyle = '#d5d5d5';
                ctx.beginPath();
                ctx.moveTo(bpLeft, bpY + bpH * 0.3);
                ctx.lineTo(bpCenterX, bpBottom);
                ctx.lineTo(bpCenterX, bpBottom + bpH * 0.15);
                ctx.lineTo(bpLeft, bpY + bpH * 0.3 + bpH * 0.15);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#b8b8b8';
                ctx.beginPath();
                ctx.moveTo(bpCenterX, bpBottom);
                ctx.lineTo(bpRight, bpY + bpH * 0.3);
                ctx.lineTo(bpRight, bpY + bpH * 0.3 + bpH * 0.15);
                ctx.lineTo(bpCenterX, bpBottom + bpH * 0.15);
                ctx.closePath();
                ctx.fill();

                // ── Colored Blocks on Baseplate ──
                function drawBlock(cx, cy, w, h, color, shadowColor) {
                    const halfW = w / 2;
                    const halfH = h / 2;
                    const topY = cy - halfH;
                    const bottomY = cy + halfH * 0.5;
                    const leftX = cx - halfW;
                    const rightX = cx + halfW;

                    // Shadow
                    ctx.fillStyle = '#00000025';
                    ctx.beginPath();
                    ctx.moveTo(cx, topY + halfH * 0.35);
                    ctx.lineTo(rightX + halfW * 0.2, topY + halfH * 0.55);
                    ctx.lineTo(cx + halfW * 0.15, bottomY + halfH * 0.3);
                    ctx.lineTo(leftX - halfW * 0.1, topY + halfH * 0.55);
                    ctx.closePath();
                    ctx.fill();

                    // Top face
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.moveTo(cx, topY);
                    ctx.lineTo(rightX, topY + halfH * 0.25);
                    ctx.lineTo(cx, topY + halfH * 0.5);
                    ctx.lineTo(leftX, topY + halfH * 0.25);
                    ctx.closePath();
                    ctx.fill();

                    // Left face
                    const darkColor = shadeColor(color, -0.3);
                    ctx.fillStyle = darkColor;
                    ctx.beginPath();
                    ctx.moveTo(leftX, topY + halfH * 0.25);
                    ctx.lineTo(cx, topY + halfH * 0.5);
                    ctx.lineTo(cx, bottomY);
                    ctx.lineTo(leftX, topY + halfH * 0.25 + halfH * 0.5);
                    ctx.closePath();
                    ctx.fill();

                    // Right face
                    const darkerColor = shadeColor(color, -0.45);
                    ctx.fillStyle = darkerColor;
                    ctx.beginPath();
                    ctx.moveTo(cx, topY + halfH * 0.5);
                    ctx.lineTo(rightX, topY + halfH * 0.25);
                    ctx.lineTo(rightX, topY + halfH * 0.25 + halfH * 0.5);
                    ctx.lineTo(cx, bottomY);
                    ctx.closePath();
                    ctx.fill();

                    // Top highlight
                    ctx.fillStyle = shadeColor(color, 0.25);
                    ctx.beginPath();
                    ctx.moveTo(cx, topY);
                    ctx.lineTo(rightX, topY + halfH * 0.25);
                    ctx.lineTo(cx, topY + halfH * 0.5);
                    ctx.lineTo(leftX, topY + halfH * 0.25);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = shadeColor(color, 0.4);
                    ctx.beginPath();
                    ctx.moveTo(cx - halfW * 0.25, topY + halfH * 0.1);
                    ctx.lineTo(cx + halfW * 0.25, topY + halfH * 0.18);
                    ctx.lineTo(cx, topY + halfH * 0.32);
                    ctx.lineTo(cx - halfW * 0.3, topY + halfH * 0.2);
                    ctx.closePath();
                    ctx.fill();
                }

                function shadeColor(color, percent) {
                    const num = parseInt(color.replace('#', ''), 16);
                    const amt = Math.round(2.55 * percent * 100);
                    const R = Math.max(0, Math.min(255, (num >> 16) + amt));
                    const G = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF00) + amt));
                    const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
                    return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
                }

                // Place various blocks
                drawBlock(bpCenterX - bpW * 0.2, bpY + bpH * 0.2, bpW * 0.07, bpH * 0.25, '#e74c3c', '#00000033');
                drawBlock(bpCenterX + bpW * 0.15, bpY + bpH * 0.25, bpW * 0.06, bpH * 0.3, '#3498db', '#00000033');
                drawBlock(bpCenterX - bpW * 0.05, bpY + bpH * 0.15, bpW * 0.08, bpH * 0.35, '#2ecc71', '#00000033');
                drawBlock(bpCenterX + bpW * 0.28, bpY + bpH * 0.3, bpW * 0.05, bpH * 0.18, '#f39c12', '#00000033');
                drawBlock(bpCenterX - bpW * 0.32, bpY + bpH * 0.28, bpW * 0.055, bpH * 0.22, '#9b59b6', '#00000033');
                drawBlock(bpCenterX + bpW * 0.05, bpY + bpH * 0.35, bpW * 0.04, bpH * 0.14, '#1abc9c', '#00000033');
                drawBlock(bpCenterX - bpW * 0.15, bpY + bpH * 0.38, bpW * 0.065, bpH * 0.2, '#e67e22', '#00000033');

                // ── Small player-like figure ─────
                const figX = bpCenterX + bpW * 0.1;
                const figY = bpY + bpH * 0.42;
                const figScale = Math.min(bpW * 0.03, bpH * 0.12);
                // Body
                ctx.fillStyle = '#f1c40f';
                ctx.fillRect(figX - figScale * 0.4, figY - figScale * 1.8, figScale * 0.8, figScale * 1.5);
                // Head
                ctx.fillStyle = '#f9e079';
                ctx.beginPath();
                ctx.arc(figX, figY - figScale * 2.2, figScale * 0.55, 0, Math.PI * 2);
                ctx.fill();
                // Legs
                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(figX - figScale * 0.3, figY - figScale * 0.3, figScale * 0.25, figScale * 0.8);
                ctx.fillRect(figX + figScale * 0.05, figY - figScale * 0.3, figScale * 0.25, figScale * 0.8);
                // Arms
                ctx.fillStyle = '#f1c40f';
                ctx.fillRect(figX - figScale * 0.75, figY - figScale * 1.4, figScale * 0.25, figScale * 0.9);
                ctx.fillRect(figX + figScale * 0.5, figY - figScale * 1.4, figScale * 0.25, figScale * 0.9);

                // ── Tree on the side ─────────────
                const treeX = bpCenterX - bpW * 0.55;
                const treeY = bpY + bpH * 0.55;
                ctx.fillStyle = '#5d3a1a';
                ctx.fillRect(treeX - bpW * 0.015, treeY - bpH * 0.5, bpW * 0.03, bpH * 0.5);
                ctx.fillStyle = '#3d7a28';
                ctx.beginPath();
                ctx.arc(treeX, treeY - bpH * 0.55, bpW * 0.08, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#4a942e';
                ctx.beginPath();
                ctx.arc(treeX - bpW * 0.03, treeY - bpH * 0.6, bpW * 0.05, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(treeX + bpW * 0.03, treeY - bpH * 0.58, bpW * 0.05, 0, Math.PI * 2);
                ctx.fill();

                // ── Spawn location marker ────────
                const spawnX = bpCenterX + bpW * 0.35;
                const spawnY = bpY + bpH * 0.5;
                const spawnR = bpW * 0.04;
                ctx.fillStyle = '#ffffff44';
                ctx.beginPath();
                ctx.arc(spawnX, spawnY, spawnR, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#ffffff88';
                ctx.lineWidth = 2;
                ctx.setLineDash([4, 3]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = '#ffffff';
                ctx.font = `${Math.max(8, spawnR * 0.6)}px "${getComputedStyle(document.body).fontFamily.split(',')[0]}"`;
                ctx.textAlign = 'center';
                ctx.fillText('Spawn', spawnX, spawnY + spawnR * 2.2);
                ctx.textAlign = 'start';

                // ── Vignette ─────────────────────
                const vignetteGrad = ctx.createRadialGradient(W / 2, H / 2, Math.max(W, H) * 0.5, W / 2, H / 2, Math.max(W,
                    H) * 0.75);
                vignetteGrad.addColorStop(0, 'transparent');
                vignetteGrad.addColorStop(1, '#00000044');
                ctx.fillStyle = vignetteGrad;
                ctx.fillRect(0, 0, W, H);

                // ── Border ───────────────────────
                ctx.strokeStyle = '#ffffff15';
                ctx.lineWidth = 1;
                ctx.strokeRect(0.5, 0.5, W - 1, H - 1);
            }

            // Initial draw and resize handler
            function redrawGame() {
                drawGameScene();
            }

            // Debounced resize for canvas
            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    redrawGame();
                }, 150);
            });

            // Use ResizeObserver for more responsive canvas updates
            if (window.ResizeObserver) {
                const ro = new ResizeObserver(() => {
                    clearTimeout(resizeTimeout);
                    resizeTimeout = setTimeout(() => {
                        redrawGame();
                    }, 100);
                });
                ro.observe(gameCanvasContainer);
            }

            // Initial draw
            setTimeout(redrawGame, 200);

            // ───────────────────────────────────
            // DRAGGABLE DIVIDERS
            // ───────────────────────────────────
            let activeDivider = null;
            let dragStartData = {};

            function getFlexBasis(el) {
                const style = el.style.flex;
                const match = style.match(/0\s+0\s+([\d.]+)(%|px)/);
                if (match) {
                    return { value: parseFloat(match[1]), unit: match[2] };
                }
                return null;
            }

            function setFlexBasis(el, value, unit) {
                el.style.flex = `0 0 ${value}${unit}`;
            }

            dividerVertical.addEventListener('mousedown', (e) => {
                e.preventDefault();
                activeDivider = 'vertical';
                dividerVertical.classList.add('active');
                const execFlex = getFlexBasis(panelExecutor);
                const rightFlex = getFlexBasis(panelRight);
                const containerRect = mainContainer.getBoundingClientRect();
                dragStartData = {
                    mouseX: e.clientX,
                    execValue: execFlex ? execFlex.value : 42,
                    execUnit: execFlex ? execFlex.unit : '%',
                    rightValue: rightFlex ? rightFlex.value : 58,
                    rightUnit: rightFlex ? rightFlex.unit : '%',
                    containerWidth: containerRect.width,
                    dividerWidth: dividerVertical.getBoundingClientRect().width,
                };
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            });

            dividerHorizontal.addEventListener('mousedown', (e) => {
                e.preventDefault();
                activeDivider = 'horizontal';
                dividerHorizontal.classList.add('active');
                const gameFlex = getFlexBasis(panelGame);
                const consoleFlex = getFlexBasis(panelConsole);
                const rightRect = panelRight.getBoundingClientRect();
                dragStartData = {
                    mouseY: e.clientY,
                    gameValue: gameFlex ? gameFlex.value : 58,
                    gameUnit: gameFlex ? gameFlex.unit : '%',
                    consoleValue: consoleFlex ? consoleFlex.value : 42,
                    consoleUnit: consoleFlex ? consoleFlex.unit : '%',
                    containerHeight: rightRect.height,
                    dividerHeight: dividerHorizontal.getBoundingClientRect().height,
                };
                document.body.style.cursor = 'row-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', (e) => {
                if (!activeDivider) return;

                if (activeDivider === 'vertical') {
                    const containerRect = mainContainer.getBoundingClientRect();
                    const dividerW = dragStartData.dividerWidth;
                    const totalWidth = containerRect.width - dividerW;
                    const deltaX = e.clientX - dragStartData.mouseX;
                    const deltaPercent = (deltaX / totalWidth) * 100;

                    let newExec = dragStartData.execValue + deltaPercent;
                    let newRight = dragStartData.rightValue - deltaPercent;

                    // Clamp
                    newExec = Math.max(20, Math.min(75, newExec));
                    newRight = 100 - newExec;

                    setFlexBasis(panelExecutor, newExec, '%');
                    setFlexBasis(panelRight, newRight, '%');
                }

                if (activeDivider === 'horizontal') {
                    const rightRect = panelRight.getBoundingClientRect();
                    const dividerH = dragStartData.dividerHeight;
                    const totalHeight = rightRect.height - dividerH;
                    const deltaY = e.clientY - dragStartData.mouseY;
                    const deltaPercent = (deltaY / totalHeight) * 100;

                    let newGame = dragStartData.gameValue + deltaPercent;
                    let newConsole = dragStartData.consoleValue - deltaPercent;

                    // Clamp
                    newGame = Math.max(25, Math.min(80, newGame));
                    newConsole = 100 - newGame;

                    setFlexBasis(panelGame, newGame, '%');
                    setFlexBasis(panelConsole, newConsole, '%');
                }

                // Redraw canvas after resize
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    redrawGame();
                }, 50);
            });

            document.addEventListener('mouseup', () => {
                if (activeDivider) {
                    dividerVertical.classList.remove('active');
                    dividerHorizontal.classList.remove('active');
                    activeDivider = null;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                    dragGhost.style.display = 'none';
                    // Final redraw
                    setTimeout(redrawGame, 100);
                }
            });

            // Touch support for dividers
            dividerVertical.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                activeDivider = 'vertical';
                dividerVertical.classList.add('active');
                const execFlex = getFlexBasis(panelExecutor);
                const rightFlex = getFlexBasis(panelRight);
                const containerRect = mainContainer.getBoundingClientRect();
                dragStartData = {
                    mouseX: touch.clientX,
                    execValue: execFlex ? execFlex.value : 42,
                    execUnit: execFlex ? execFlex.unit : '%',
                    rightValue: rightFlex ? rightFlex.value : 58,
                    rightUnit: rightFlex ? rightFlex.unit : '%',
                    containerWidth: containerRect.width,
                    dividerWidth: dividerVertical.getBoundingClientRect().width,
                };
            }, { passive: false });

            dividerHorizontal.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                activeDivider = 'horizontal';
                dividerHorizontal.classList.add('active');
                const gameFlex = getFlexBasis(panelGame);
                const consoleFlex = getFlexBasis(panelConsole);
                const rightRect = panelRight.getBoundingClientRect();
                dragStartData = {
                    mouseY: touch.clientY,
                    gameValue: gameFlex ? gameFlex.value : 58,
                    gameUnit: gameFlex ? gameFlex.unit : '%',
                    consoleValue: consoleFlex ? consoleFlex.value : 42,
                    consoleUnit: consoleFlex ? consoleFlex.unit : '%',
                    containerHeight: rightRect.height,
                    dividerHeight: dividerHorizontal.getBoundingClientRect().height,
                };
            }, { passive: false });

            document.addEventListener('touchmove', (e) => {
                if (!activeDivider) return;
                const touch = e.touches[0];
                // Simulate mousemove with touch
                const fakeEvent = { clientX: touch.clientX, clientY: touch.clientY };
                document.dispatchEvent(new MouseEvent('mousemove', fakeEvent));
            }, { passive: false });

            document.addEventListener('touchend', () => {
                if (activeDivider) {
                    dividerVertical.classList.remove('active');
                    dividerHorizontal.classList.remove('active');
                    activeDivider = null;
                    dragGhost.style.display = 'none';
                    setTimeout(redrawGame, 100);
                }
            });

            // ───────────────────────────────────
            // INITIALIZATION
            // ───────────────────────────────────
            function init() {
                updateLineNumbers();
                setTimeout(redrawGame, 300);
                // Focus editor on load
                setTimeout(() => {
                    codeEditor.focus();
                    codeEditor.setSelectionRange(codeEditor.value.length, codeEditor.value.length);
                }, 400);
            }

            // Handle window resize for panel constraints
            window.addEventListener('resize', () => {
                // Ensure panels don't overflow
                const execFlex = getFlexBasis(panelExecutor);
                if (execFlex && execFlex.value > 75) {
                    setFlexBasis(panelExecutor, 75, '%');
                    setFlexBasis(panelRight, 25, '%');
                }
                if (execFlex && execFlex.value < 20) {
                    setFlexBasis(panelExecutor, 20, '%');
                    setFlexBasis(panelRight, 80, '%');
                }
                redrawGame();
            });

            init();

            // ───────────────────────────────────
            // KEYBOARD SHORTCUTS INFO
            // ───────────────────────────────────
            console.log('%c🛠️  Lua Sandbox Ready %c| %cCtrl+Enter %cto execute %c| %cCtrl+Shift+X %cto clear',
                'color:#58a6ff;font-weight:bold;',
                '',
                'color:#f0883e;',
                '',
                'color:#f0883e;',
                ''
            );

            // Expose redraw for external calls
            window.redrawGameScene = redrawGame;
        })();
    </script>
</body>
</html>
